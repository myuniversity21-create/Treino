<style>
:root{
  --bg:#06090f; --card:#0d1520; --card2:#0f1929; --line:#1a2535; --line2:#1e2d45;
  --tx:#e2e8f0; --mut:#64748b; --dim:#4a6a8a; --faint:#334155;
  --cyan:#0ea5e9; --amber:#f59e0b; --green:#10b981; --lime:#4ade80;
  --violet:#8b5cf6; --pink:#ec4899; --teal:#14b8a6; --corda:#ff7a3d;
  --serif:'Fraunces',Georgia,serif; --mono:'DM Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--mono);font-size:12px;line-height:1.5;padding-bottom:76px;min-height:100vh}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none}
.wrap{max-width:560px;margin:0 auto}

/* header */
.hdr{background:linear-gradient(180deg,#0d1520 0%,#06090f 100%);border-bottom:1px solid var(--line);padding:18px 20px 12px;display:flex;justify-content:space-between;align-items:flex-end}
.hdr .eb{font-size:8px;color:#4a7fa8;letter-spacing:4px;margin-bottom:3px}
.hdr h1{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.hdr h1 em{font-style:normal;color:var(--corda)}
.hdr .ic{font-size:22px}

/* nav inferior */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#080c14;border-top:1px solid var(--line);display:flex;z-index:50}
.bnav button{flex:1;padding:12px 4px 10px;background:none;border:none;border-top:2px solid transparent;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav button.on{border-top-color:var(--corda);color:var(--corda)}
.bnav .i{font-size:17px}.bnav .l{font-size:7px;letter-spacing:2px}

/* subtabs */
.subtabs{display:flex;border-bottom:1px solid var(--line2);background:#0b1220;position:sticky;top:0;z-index:20}
.subtabs button{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-size:8px;letter-spacing:2px}
.subtabs button.on{border-bottom-color:var(--cyan);color:var(--cyan)}

.pad{padding:16px}
.card{border-radius:12px;background:var(--card);border:1px solid var(--line);padding:13px;margin-bottom:10px}
.eb{font-size:9px;letter-spacing:3px;color:var(--dim)}
.serif{font-family:var(--serif);font-weight:700}
.bar{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:10px}
.bar>div{height:100%;border-radius:2px;transition:width .3s}
.note{padding:8px 11px;border-radius:7px;background:var(--bg);font-size:11px;color:#94a3b8;line-height:1.6;margin-top:10px}
.chip{font-size:8px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px}
.ck{width:20px;height:20px;border-radius:5px;flex-shrink:0;border:1px solid #2a3a50;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;color:transparent;font-size:11px}
.ck.on{border:none;color:#fff}
.row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer}
.row:last-child{border-bottom:none}
.row .t{font-size:11px}
.row.done .t{color:var(--mut);text-decoration:line-through}
.yt{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 10px;border-radius:6px;background:#1a0a0a;border:1px solid #ff000040;color:#ff4444;font-size:9px;font-weight:700;letter-spacing:1px}
.grid7{display:flex;gap:6px;justify-content:space-between}
.pill{padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid #2a3a50;background:var(--card);color:var(--dim)}
.pill.on{background:#0a2010;border-color:#16a34a;color:var(--lime)}
.daybtn{flex-shrink:0;width:50px;height:56px;border-radius:10px;border:1px solid var(--line2);background:var(--card2);color:var(--dim);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative}
.daybtn .sub{font-size:7px;opacity:.7}
.daybtn .dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--lime)}
.exp{border-radius:10px;overflow:hidden;background:var(--card2);border:1px solid var(--line);margin-bottom:8px}
.exp-h{display:flex;align-items:center;padding:12px 14px;gap:12px;cursor:pointer}
.exp-b{padding:10px 14px 14px;font-size:11px;color:#94a3b8;line-height:1.6}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;border-radius:7px;background:#0a1020;border:1px solid var(--line);margin-bottom:6px}
.macros{display:flex;gap:1px;height:5px;border-radius:3px;overflow:hidden}
.mtag{font-size:9px}
/* elevação */
.elev-card{border-radius:14px;background:linear-gradient(135deg,#0d1a2a,#0a1520);border:1px solid #1a3050;padding:14px;margin-bottom:14px;overflow:hidden}
#svgElev{width:100%;height:auto;display:block;margin-top:6px}
.camp-label{font-size:9px;fill:var(--dim);font-family:var(--mono)}
.camp-label.on{fill:var(--tx)}
.mes-sel{display:flex;align-items:center;gap:8px}
.mes-sel button{background:var(--line2);border:none;color:var(--tx);width:28px;height:28px;border-radius:8px;font-size:15px}
.mes-sel span{min-width:64px;text-align:center;color:var(--corda);font-weight:700;font-size:12px}
h2.sec{font-family:var(--serif);font-size:17px;margin:18px 0 10px}
h2.sec em{font-style:normal;color:var(--corda)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

let state={mes:4,days:{}};
let ui={screen:"hoje",trainTab:"treino",nutriTab:"plano",activeDay:0,expEx:null,expMeal:null};
let memFallback=null;

function todayKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function weekStartKey(){const d=new Date();const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const m=new Date(d.setDate(diff));return m.getFullYear()+"-"+String(m.getMonth()+1).padStart(2,"0")+"-"+String(m.getDate()).padStart(2,"0");}
function dayIndex(){const d=new Date().getDay();return {1:0,2:1,3:2,4:3,5:4,6:5,0:6}[d];}
function isSunday(){return new Date().getDay()===0;}
function getLast7(){const r=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);r.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));}return r;}
function today(){
  const tk=todayKey();
  if(!state.days[tk])state.days[tk]={m:{},di:{},w:false,ex:{},weekStart:weekStartKey()};
  state.days[tk].weekStart=state.days[tk].weekStart||weekStartKey();
  return state.days[tk];
}
async function save(){
  const json=JSON.stringify(state);
  try{if(window.storage){await window.storage.set("montanha-corpo-v2",json);return;}}catch(e){}
  try{localStorage.setItem("montanha-corpo-v2",json);return;}catch(e){}
  memFallback=json;
}
async function load(){
  try{if(window.storage){const r=await window.storage.get("montanha-corpo-v2");if(r&&r.value){state=JSON.parse(r.value);return;}}}catch(e){}
  try{const j=localStorage.getItem("montanha-corpo-v2");if(j){state=JSON.parse(j);return;}}catch(e){}
  if(memFallback)state=JSON.parse(memFallback);
}

/* ================== HELPERS ================== */
function cnt(o){return Object.values(o||{}).filter(Boolean).length;}
function esc(s){return String(s).replace(/"/g,"&quot;");}
function ytBtn(name){return `<a class="yt" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" href="https://www.youtube.com/results?search_query=${encodeURIComponent(name+" como fazer tutorial")}"><svg width="11" height="11" viewBox="0 0 24 24" fill="#ff4444"><path d="M23.5 6.2s-.2-1.6-.9-2.3c-.9-.9-1.9-.9-2.3-1C17.4 2.7 12 2.7 12 2.7s-5.4 0-8.3.2c-.4.1-1.4.1-2.3 1-.7.7-.9 2.3-.9 2.3S.3 8 .3 9.8v1.7c0 1.8.2 3.6.2 3.6s.2 1.6.9 2.3c.9.9 2 .9 2.6 1 1.9.2 7.9.2 7.9.2s5.4 0 8.3-.2c.4-.1 1.4-.1 2.3-1 .7-.7.9-2.3.9-2.3s.2-1.8.2-3.6V9.8c0-1.8-.2-3.6-.2-3.6zM9.7 15.5V8.1l6.3 3.7-6.3 3.7z"/></svg>TUTORIAL</a>`;}
function macroBar(p,c,f){const t=p*4+c*4+f*9;return `<div class="macros"><div style="width:${p*4/t*100}%;background:var(--cyan)"></div><div style="width:${c*4/t*100}%;background:var(--amber)"></div><div style="width:${f*9/t*100}%;background:var(--pink)"></div></div><div style="display:flex;gap:8px;margin-top:4px" class="mtag"><span style="color:var(--cyan)">P ${p}g</span><span style="color:var(--amber)">C ${c}g</span><span style="color:var(--pink)">G ${f}g</span></div>`;}
function ck(on,color,handler){return `<button class="ck ${on?'on':''}" style="${on?'background:'+color:''}" onclick="event.stopPropagation();${handler}">✓</button>`;}
function weekVol(){
  const wk=weekStartKey();const vol={};
  Object.values(state.days).forEach(d=>{
    if(d.weekStart!==wk||!d.ex)return;
    Object.entries(d.ex).forEach(([k,done])=>{
      if(!done)return;
      const[dId,eI]=k.split("-").map(Number);
      const dd=DAYS_DATA.find(x=>x.id===dId);if(!dd)return;
      const ex=dayExercises(dd)[eI];if(!ex||ex.muscle==="Cardio")return;
      vol[ex.muscle]=(vol[ex.muscle]||0)+ex.sets;
    });
  });
  return vol;
}
function streak(){
  const keys=getLast7();let s=0;
  for(let i=keys.length-1;i>=0;i--){
    const d=state.days[keys[i]];
    if(d&&(d.w||cnt(d.m)>0))s++;else break;
  }
  return s;
}

function togExp(i){ui.expEx=ui.expEx===i?null:i;render();}
function togMeal(i){ui.expMeal=ui.expMeal===i?null:i;render();}
function togM(i){const t=today();t.m[i]=!t.m[i];save();render();}
function togDi(i){const t=today();t.di[i]=!t.di[i];save();render();}
function togW(){const t=today();t.w=!t.w;save();render();}
function togEx(dayId,ei){const t=today();const k=dayId+"-"+ei;t.ex[k]=!t.ex[k];save();render();}
function mudaMes(d){state.mes=Math.min(12,Math.max(1,state.mes+d));save();render();}
function addPeso(){
  const inp=document.getElementById("pesoInput");
  const v=parseFloat(String(inp.value).replace(",", "."));
  if(!v||v<40||v>200)return;
  state.pesos=state.pesos||[];
  state.pesos.push({d:todayKey(),kg:Math.round(v*10)/10});
  state.pesos.sort((a,b)=>a.d<b.d?-1:1);
  save();render();
}
function delPeso(i){state.pesos.splice(i,1);save();render();}
function exportar(){
  const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="montanha-corpo-backup-"+todayKey()+".json";
  a.click();URL.revokeObjectURL(a.href);
}
function importar(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const s=JSON.parse(r.result);if(s&&s.days){state=s;save();render();}else alert("Arquivo inválido.");}catch(e){alert("Arquivo inválido.");}};
  r.readAsText(f);
}

      <div style="font-size:11px;color:#94a3b8;margin-top:6px;line-height:1.6">Calculado com base nos exercícios marcados como <span style="color:var(--lime)">concluídos</span> esta semana. Reset toda segunda-feira.</div>
    </div>
    ${Object.entries(VOLUME_TARGETS).map(([muscle,{target,color}])=>{
      const actual=vol[muscle]||0;const pct=Math.min(100,actual/target*100);const ok=actual>=target;
      return `<div class="card" style="${ok?'border-color:#16a34a30':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="font-size:12px;font-weight:500">${muscle}</div>
          <div class="chip" style="background:${ok?'#0a2010':'#1a1a2a'};color:${ok?'var(--lime)':'var(--amber)'};border:1px solid ${ok?'#16a34a40':'#92400e40'}">${actual}/${target} ${ok?"✓":""}</div>
        </div>
        <div style="height:6px;background:var(--line);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;transition:width .4s;width:${pct}%;background:${ok?`linear-gradient(90deg,${color},#4ade80)`:`linear-gradient(90deg,${color}80,${color})`}"></div></div>
        ${!ok&&actual>0?`<div style="font-size:9px;color:var(--amber);margin-top:4px">Faltam ${target-actual} séries</div>`:actual===0?`<div style="font-size:9px;color:var(--faint);margin-top:4px">Nenhum exercício marcado ainda</div>`:""}
      </div>`;
    }).join("")}
    </div>`;
  }
  return html;
}

function screenNutricao(){
  const h=new Date().getHours();
  let html=`<div style="padding:14px 16px 0"><div style="display:flex;gap:7px">
    ${[["KCAL","3.600","#f59e0b"],["PROT","172g","#0ea5e9"],["CARB","545g","#10b981"],["GORD","81g","#ec4899"]].map(([l,v,c])=>`
    <div style="flex:1;padding:9px 4px;border-radius:10px;background:${c}12;border:1px solid ${c}30;text-align:center">
      <div style="font-size:13px;font-weight:700;color:${c}">${v}</div>
      <div style="font-size:7px;color:var(--dim);margin-top:2px;letter-spacing:1px">${l}</div>
    </div>`).join("")}
  </div></div>
  <div class="subtabs" style="margin-top:12px;position:static">
    ${[["plano","REFEIÇÕES"],["suplementos","SUPLEM."],["pele","PELE+MENTE"],["regras","REGRAS"]].map(([k,l])=>`<button class="${ui.nutriTab===k?'on':''}" style="${ui.nutriTab===k?'border-bottom-color:var(--green);color:var(--green)':''}" onclick="setNutriTab('${k}')">${l}</button>`).join("")}
  </div>`;

  if(ui.nutriTab==="plano"){
    html+=`<div class="pad">
    ${MEALS.map((m,i)=>{
      const mh=parseInt(m.time.split(":")[0]);const cur=h>=mh&&h<mh+3;const open=ui.expMeal===i;
      return `<div style="margin-bottom:10px;border-radius:12px;overflow:hidden;cursor:pointer;background:${open?m.color+"0e":"var(--card)"};border:1px solid ${cur?m.color+"70":open?m.color+"40":"var(--line)"}" onclick="togMeal(${i})">
        ${cur?`<div style="padding:4px 14px;background:${m.color}20;font-size:8px;color:${m.color};letter-spacing:2px">→ AGORA</div>`:""}
        <div style="padding:13px;display:flex;gap:12px;align-items:center">
          <div style="width:40px;height:40px;border-radius:10px;background:${m.color}18;border:1px solid ${m.color}30;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${m.icon}</div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div><div class="eb" style="color:${m.color};margin-bottom:2px">${m.time}</div><div style="font-size:13px;font-weight:700">${m.name}</div></div>
              <div style="font-size:11px;color:${m.color};font-weight:700;background:${m.color}15;padding:2px 7px;border-radius:4px">${m.kcal} kcal</div>
            </div>
            <div style="margin-top:7px">${macroBar(m.p,m.c,m.f)}</div>
          </div>
        </div>
        ${open?`<div style="border-top:1px solid ${m.color}20;padding:13px">
          <div class="note" style="border-left:3px solid ${m.color};margin:0 0 11px"><span style="color:${m.color};font-size:9px;letter-spacing:2px">POR QUÊ — </span>${m.why}</div>
          ${m.foods.map(([item,qty,p,c,f])=>`<div class="mrow">
            <div><div style="font-size:11px;font-weight:500">${item}</div><div style="font-size:9px;color:var(--dim);margin-top:1px">${qty}</div></div>
            <div style="display:flex;gap:6px;font-size:9px"><span style="color:var(--cyan)">P${p}</span><span style="color:var(--amber)">C${c}</span><span style="color:var(--pink)">G${f}</span></div>
          </div>`).join("")}
        </div>`:""}
      </div>`;
    }).join("")}
    <div class="note" style="border-left:2px solid var(--cyan)"><b style="color:var(--cyan)">Balança como altímetro:</b> pesa-te 2×/semana em jejum. Alvo: +0,25 a 0,5% do peso/semana. Acima disso, corta 200 kcal de carbo; estagnado 2 semanas, adiciona 200 kcal.</div>
    <div class="note" style="border-left:2px solid var(--corda)"><b style="color:var(--corda)">Pendência do ano:</b> agendar a consulta com nutricionista esportivo e levar este plano para validar.</div>
    </div>`;
  }

  if(ui.nutriTab==="suplementos"){
    html+=`<div class="pad">
    ${SUPPS.map(s=>`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px;font-weight:700">${s.name}</div>
        <div class="chip" style="background:${s.p==="ESSENCIAL"?"#0a2010":s.p==="IMPORTANTE"?"#1a1a0a":"#1a1a2a"};color:${s.p==="ESSENCIAL"?"var(--lime)":s.p==="IMPORTANTE"?"var(--amber)":"var(--mut)"};border:1px solid ${s.p==="ESSENCIAL"?"#16a34a40":s.p==="IMPORTANTE"?"#92400e40":"#33415540"}">${s.p}</div>
      </div>
      <div style="font-size:10px;color:${s.c};margin-top:4px">${s.d} · ${s.w}</div>
      <div style="font-size:10px;color:var(--mut);margin-top:6px;line-height:1.5">${s.why}</div>
    </div>`).join("")}
    </div>`;
  }

  if(ui.nutriTab==="pele"){
    html+=`<div class="pad">
    <div class="card" style="background:linear-gradient(135deg,#14b8a612,#14b8a606);border-color:#14b8a630">
      <div class="eb" style="color:var(--teal);margin-bottom:4px">UPGRADES DIRECIONADOS</div>
      <div class="serif" style="font-size:17px">PELE + MEMÓRIA</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:6px;line-height:1.6">Ajustes finos sobre o plano que já segues. Honestidade primeiro: sono de 7h, 3L de água e o cardio que começas agora valem mais que qualquer item desta lista.</div>
    </div>
    ${PELEMENTE.map(([ic,tt,b])=>`<div class="card">
      <div style="display:flex;gap:12px">
        <div style="width:34px;height:34px;border-radius:8px;background:#0a1a1a;border:1px solid #1a3a3a;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${ic}</div>
        <div><div style="font-size:12px;font-weight:700;margin-bottom:4px">${tt}</div><div style="font-size:11px;color:var(--mut);line-height:1.6">${b}</div></div>
      </div>
    </div>`).join("")}
    </div>`;
  }

  if(ui.nutriTab==="regras"){
    html+=`<div class="pad">
    ${RULES.map(([ic,tt,b])=>`<div class="card">
      <div style="display:flex;gap:12px">
        <div style="width:34px;height:34px;border-radius:8px;background:#0a1a10;border:1px solid #1a3a2a;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${ic}</div>
        <div><div style="font-size:12px;font-weight:700;margin-bottom:4px">${tt}</div><div style="font-size:11px;color:var(--mut);line-height:1.6">${b}</div></div>
      </div>
    </div>`).join("")}
    </div>`;
  }
  return html;
}

function screenMontanha(){
  const frac=Math.min(state.mes,12)/12;
  const chave=Object.keys(FASES).map(Number).filter(k=>k<=state.mes).pop()||1;
  return `<div class="pad">
  <div class="elev-card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div class="eb" style="color:#4a7fa8">PERFIL DA SUBIDA · ANO 1</div>
      <div class="mes-sel">
        <button onclick="mudaMes(-1)" aria-label="Mês anterior">−</button><span>Mês ${state.mes}</span><button onclick="mudaMes(1)" aria-label="Próximo mês">+</button>
      </div>
    </div>
    <svg id="svgElev" viewBox="0 0 960 225" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Perfil de elevação com os campos base">
      <defs><linearGradient id="mont" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c3050"/><stop offset="1" stop-color="#0a1520"/></linearGradient></defs>
      <path d="M0,205 L90,190 L200,168 L330,140 L470,105 L620,68 L780,30 L840,18 L870,26 L960,60 L960,225 L0,225 Z" fill="url(#mont)"/>
      <path id="trilha" d="M40,196 L170,176 L320,148 L500,110 L680,66 L840,20" fill="none" stroke="#264057" stroke-width="2" stroke-dasharray="5 6"/>
      <path id="trilhaFeita" d="M40,196 L170,176 L320,148 L500,110 L680,66 L840,20" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
      <g id="camps">${CAMPS.map(c=>{const on=state.mes>=c.m;return `<circle cx="${c.x}" cy="${c.y}" r="5" fill="${on?"#0ea5e9":"#264057"}"/><text x="${c.x}" y="${c.y-12}" text-anchor="${c.x>820?"end":"middle"}" class="camp-label ${on?"on":""}">${c.n}</text>`;}).join("")}</g>
      <g id="marcador"><circle r="7" fill="#ff7a3d"/><circle r="12" fill="none" stroke="#ff7a3d" stroke-width="1.5" opacity=".5"/></g>
    </svg>
    <div class="note" style="border-left:2px solid var(--corda);margin-top:2px"><b style="color:var(--corda)">Onde estás:</b> ${FASES[chave]}</div>
  </div>

  <h2 class="sec">Metas do <em>ano 1</em></h2>
  ${METAS.map(([tt,b])=>`<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:3px">${tt}</div><div style="font-size:11px;color:var(--mut);line-height:1.6">${b}</div></div>`).join("")}

  <h2 class="sec">Visão <em>3–5 anos</em></h2>
  <div class="card"><div style="font-size:11px;color:#94a3b8;line-height:1.7">Estilo de vida de atleta: natação, corrida, ciclismo e ténis na rotina. Provas — talvez triathlon — com bom desempenho. Corpo forte, definido e funcional, com energia alta e alimentação de comida de verdade a sustentar o ritmo. Esta montanha é a primeira; o triathlon é a cordilheira seguinte.</div></div>
  </div>`;
}

function screenEvolucao(){
  const pesos=state.pesos||[];
  /* gráfico de peso */
  let chart="";
  if(pesos.length>=2){
    const kgs=pesos.map(p=>p.kg);
    const min=Math.min(...kgs)-0.5,max=Math.max(...kgs)+0.5;
    const W=300,H=110,PADL=34,PADB=16;
    const pts=pesos.map((p,i)=>{
      const x=PADL+i*(W-PADL-8)/(pesos.length-1);
      const y=6+(1-(p.kg-min)/(max-min))*(H-PADB-6);
      return[x,y];
    });
    chart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;margin-top:10px" role="img" aria-label="Gráfico de peso">
      <line x1="${PADL}" y1="${H-PADB}" x2="${W-4}" y2="${H-PADB}" stroke="#1e2d45"/>
      <text x="2" y="12" font-size="9" fill="#4a6a8a" font-family="DM Mono">${max.toFixed(1)}</text>
      <text x="2" y="${H-PADB}" font-size="9" fill="#4a6a8a" font-family="DM Mono">${min.toFixed(1)}</text>
      <polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="#0ea5e9" stroke-width="2"/>
      ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#ff7a3d"/>`).join("")}
    </svg>`;
  }
  const delta=pesos.length>=2?(pesos[pesos.length-1].kg-pesos[0].kg):null;

  /* histórico semanal derivado dos dias guardados */
  const semanas={};
  Object.entries(state.days).forEach(([k,d])=>{
    const wk=d.weekStart||k;
    if(!semanas[wk])semanas[wk]={tr:0,m:0,di:0,n:0};
    const s=semanas[wk];
    if(d.w)s.tr++;
    s.m+=cnt(d.m)/MORNING_ITEMS.length;
    s.di+=cnt(d.di)/DIET_ITEMS.length;
    s.n++;
  });
  const wkeys=Object.keys(semanas).sort().reverse().slice(0,12);

  return `<div class="pad">
  <div class="card" style="background:linear-gradient(135deg,#0ea5e912,#0ea5e906);border-color:#0ea5e930">
    <div class="eb" style="color:var(--cyan);margin-bottom:4px">ALTÍMETRO — PESO CORPORAL</div>
    <div class="serif" style="font-size:17px">${pesos.length?pesos[pesos.length-1].kg.toFixed(1).replace(".",",")+" kg":"Regista o 1º peso"}
      ${delta!==null?`<span style="font-size:12px;color:${delta>=0?"var(--lime)":"var(--amber)"}"> (${delta>=0?"+":""}${delta.toFixed(1).replace(".",",")} kg desde o início)</span>`:""}
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <input id="pesoInput" type="number" step="0.1" min="40" max="200" inputmode="decimal" placeholder="ex.: 79,4"
        style="flex:1;background:#0a1020;border:1px solid var(--line2);border-radius:8px;color:var(--tx);padding:9px 12px;font-family:inherit;font-size:13px">
      <button class="pill" style="border-color:var(--cyan);color:var(--cyan)" onclick="addPeso()">REGISTAR</button>
    </div>
    ${chart}
    <div class="note" style="border-left:2px solid var(--cyan)">Pesa-te 2×/semana, em jejum, na mesma balança. Alvo do bulk: <b style="color:var(--cyan)">+0,25 a 0,5%/semana</b> (≈ 200–400 g). Acima disso → −200 kcal de carbo; parado 2 semanas → +200 kcal.</div>
    ${pesos.length?`<div style="margin-top:10px">${pesos.slice().reverse().slice(0,8).map((p,ri)=>{
      const i=pesos.length-1-ri;
      return `<div class="mrow"><div style="font-size:11px">${p.d.split("-").reverse().join("/")}</div>
        <div style="display:flex;gap:10px;align-items:center"><span style="color:var(--cyan);font-weight:700">${p.kg.toFixed(1).replace(".",",")} kg</span>
        <button style="background:none;border:none;color:var(--faint);font-size:13px" onclick="delPeso(${i})" aria-label="Apagar registro">×</button></div></div>`;
    }).join("")}</div>`:""}
  </div>

  <div class="card">
    <div class="eb" style="margin-bottom:8px">HISTÓRICO SEMANAL — NADA SE APAGA</div>
    ${wkeys.length?wkeys.map(wk=>{
      const s=semanas[wk];
      const mPct=Math.round(s.m/7*100),dPct=Math.round(s.di/7*100);
      return `<div class="mrow">
        <div style="font-size:10px;color:var(--dim)">Semana de<br><span style="color:var(--tx);font-size:11px">${wk.split("-").reverse().join("/")}</span></div>
        <div style="display:flex;gap:12px;font-size:10px;text-align:center">
          <div><div style="color:var(--lime);font-weight:700;font-size:13px">${s.tr}</div><div style="color:var(--dim)">treinos</div></div>
          <div><div style="color:var(--amber);font-weight:700;font-size:13px">${mPct}%</div><div style="color:var(--dim)">manhã</div></div>
          <div><div style="color:var(--green);font-weight:700;font-size:13px">${dPct}%</div><div style="color:var(--dim)">dieta</div></div>
        </div>
      </div>`;
    }).join(""):`<div style="font-size:11px;color:var(--mut)">As semanas aparecem aqui automaticamente à medida que usas o app. Diferente do app antigo, cada dia fica gravado com a data — o ciclo fecha, o registro fica.</div>`}
  </div>

  <div class="card">
    <div class="eb" style="margin-bottom:8px">BACKUP — DIÁRIO DE EXPEDIÇÃO</div>
    <div style="font-size:11px;color:var(--mut);line-height:1.6;margin-bottom:10px">Os dados vivem no navegador deste dispositivo. Se limpares os dados do navegador ou trocares de celular, perdes o histórico. Exporta um backup 1×/mês.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="pill" style="border-color:var(--cyan);color:var(--cyan)" onclick="exportar()">⬇ EXPORTAR BACKUP</button>
      <label class="pill" style="border-color:var(--dim);color:var(--dim);cursor:pointer">⬆ IMPORTAR<input type="file" accept="application/json" style="display:none" onchange="importar(event)"></label>
    </div>
  </div>
  </div>`;
}

/* ================== RENDER ================== */
const SCREENS={hoje:screenHoje,treino:screenTreino,nutricao:screenNutricao,evolucao:screenEvolucao,montanha:screenMontanha};
const HDR={hoje:["DASHBOARD · MÊS ","MONTANHA <em>DO CORPO</em>","🗻"],treino:["PROGRAMA DE TREINO","SHAPE <em>V</em>","🏋️"],nutricao:["PLANO ALIMENTAR · BULK 3600","NUTRI<em>ÇÃO</em>","🥗"],evolucao:["REGISTRO DA SUBIDA","EVOLU<em>ÇÃO</em>","📈"],montanha:["MONTANHA 3 · O CORPO DE GUERREIRO","A <em>SUBIDA</em>","⛺"]};
function render(){
  document.getElementById("app").innerHTML=SCREENS[ui.screen]();
  const[eb,tt,ic]=HDR[ui.screen];
  document.getElementById("hdrEb").textContent=(ui.screen==="hoje"?eb+state.mes:eb);
  document.getElementById("hdrTitle").innerHTML=tt;
  document.getElementById("hdrIc").textContent=ic;
  document.getElementById("bnav").innerHTML=[["hoje","🏠","HOJE"],["treino","🏋️","TREINO"],["nutricao","🥗","NUTRIÇÃO"],["evolucao","📈","EVOLUÇÃO"],["montanha","🗻","MONTANHA"]]
    .map(([k,i,l])=>`<button class="${ui.screen===k?'on':''}" onclick="setScreen('${k}')"><span class="i">${i}</span><span class="l">${l}</span></button>`).join("");
  if(ui.screen==="montanha"){
    const path=document.getElementById("trilha");
    if(path){
      const L=path.getTotalLength();const frac=Math.min(state.mes,12)/12;
      const p=path.getPointAtLength(L*frac);
      document.getElementById("marcador").setAttribute("transform",`translate(${p.x},${p.y})`);
      document.getElementById("trilhaFeita").setAttribute("stroke-dasharray",`${L*frac} ${L}`);
    }
  }
}

/* ================== INIT ================== */
(async function(){
  await load();
  if(!state.days)state.days={};
  if(!state.mes)state.mes=4;
  if(!state.pesos)state.pesos=[];
  ui.activeDay=dayIndex();
  render();
})();
</script>
</body>
